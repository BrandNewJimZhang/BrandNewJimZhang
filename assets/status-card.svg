<svg xmlns="http://www.w3.org/2000/svg" width="760" height="240" viewBox="0 0 760 240" role="img" aria-labelledby="title desc">
  <title id="title">Jim Zhang status card</title>
  <desc id="desc">A Wonderlands x Showtime themed pixel status card: AI Infra, Front-end, ABaCAS-CGE and rhythm.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff0f5"/>
      <stop offset="0.55" stop-color="#ffe9f3"/>
      <stop offset="1" stop-color="#fff7df"/>
    </linearGradient>
    <style>
      .label { font: 800 22px "Arial Black","Arial",sans-serif; fill:#5c2b48; }
      .value { font: 700 17px "Arial",sans-serif; fill:#b86b91; }
      .chip  { font: 800 16px "Arial",sans-serif; fill:#5c2b48; }
    </style>
  </defs>

  <rect width="760" height="240" fill="url(#bg)"/>
  <!-- pixel frame (zero radius) -->
  <rect x="22" y="22" width="722" height="202" fill="#8c265c"/>
  <rect x="18" y="18" width="722" height="202" fill="#fffafd"/>
  <rect x="18" y="18" width="722" height="202" fill="none" stroke="#d94896" stroke-width="5"/>
  <rect x="30" y="30" width="698" height="178" fill="none" stroke="#ff85c8" stroke-width="2"/>

  <text x="48" y="72" class="label">Jim's tiny status panel</text>
  <text x="48" y="104" class="value">AI Infra + Front-end + models + cute energy on one pixel stage.</text>

  <!-- chips (zero radius pixel tags) -->
  <g class="chip">
    <g transform="translate(48 132)">
      <rect width="140" height="44" fill="#ff5eb5"/><rect width="140" height="44" fill="none" stroke="#8c265c" stroke-width="3"/>
      <text x="22" y="29" fill="#ffffff">AI Infra</text>
    </g>
    <g transform="translate(206 132)">
      <rect width="148" height="44" fill="#34dd98"/><rect width="148" height="44" fill="none" stroke="#0a3d26" stroke-width="3"/>
      <text x="22" y="29" fill="#0a3d26">Front-end</text>
    </g>
    <g transform="translate(372 132)">
      <rect width="166" height="44" fill="#ffe66d"/><rect width="166" height="44" fill="none" stroke="#8c6a00" stroke-width="3"/>
      <text x="22" y="29" fill="#5c2b48">ABaCAS-CGE</text>
    </g>
    <g transform="translate(556 132)">
      <rect width="148" height="44" fill="#c9b1ff"/><rect width="148" height="44" fill="none" stroke="#4b2d8c" stroke-width="3"/>
      <text x="26" y="29" fill="#3a1d6e">Rhythm</text>
    </g>
  </g>

  <!-- pixel sparkles -->
  <g shape-rendering="crispEdges">
    <rect x="690" y="40" width="12" height="12" fill="#ffb347"/>
    <rect x="702" y="52" width="12" height="12" fill="#ff5eb5"/>
    <rect x="40"  y="196" width="10" height="10" fill="#34dd98"/>
  </g>
</svg>
