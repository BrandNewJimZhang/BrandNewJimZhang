<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="260" viewBox="0 0 1200 260" role="img" aria-labelledby="title desc">
  <title id="title">Jim Zhang status card</title>
  <desc id="desc">A Wonderlands x Showtime themed pixel status card: AI Infra, Front-end, ABaCAS-Power and rhythm.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff0f5"/>
      <stop offset="0.55" stop-color="#ffe9f3"/>
      <stop offset="1" stop-color="#fff7df"/>
    </linearGradient>
    <style>
      .label { font: 900 30px "Arial","Helvetica",sans-serif; fill:#5c2b48; }
      .value { font: 700 21px "Arial","Helvetica",sans-serif; fill:#b86b91; }
      .chip  { font: 800 21px "Arial","Helvetica",sans-serif; fill:#5c2b48; }
    </style>
  </defs>

  <rect width="1200" height="260" fill="url(#bg)"/>
  <!-- pixel frame (zero radius) -->
  <rect x="26" y="26" width="1150" height="212" fill="#8c265c"/>
  <rect x="20" y="20" width="1150" height="212" fill="#fffafd"/>
  <rect x="20" y="20" width="1150" height="212" fill="none" stroke="#d94896" stroke-width="6"/>
  <rect x="34" y="34" width="1122" height="184" fill="none" stroke="#ff85c8" stroke-width="3"/>

  <text x="58" y="86" class="label">Jim's tiny status panel</text>
  <text x="58" y="124" class="value">AI Infra + Front-end + models + cute energy on one pixel stage.</text>

  <!-- chips (zero radius pixel tags) -->
  <g class="chip">
    <g transform="translate(58 156)">
      <rect width="190" height="50" fill="#ff5eb5"/><rect width="190" height="50" fill="none" stroke="#8c265c" stroke-width="3"/>
      <text x="28" y="33" fill="#ffffff">AI Infra</text>
    </g>
    <g transform="translate(272 156)">
      <rect width="206" height="50" fill="#34dd98"/><rect width="206" height="50" fill="none" stroke="#0a3d26" stroke-width="3"/>
      <text x="28" y="33" fill="#0a3d26">Front-end</text>
    </g>
    <g transform="translate(502 156)">
      <rect width="262" height="50" fill="#ffe66d"/><rect width="262" height="50" fill="none" stroke="#8c6a00" stroke-width="3"/>
      <text x="28" y="33" fill="#5c2b48">ABaCAS-Power</text>
    </g>
    <g transform="translate(788 156)">
      <rect width="190" height="50" fill="#c9b1ff"/><rect width="190" height="50" fill="none" stroke="#4b2d8c" stroke-width="3"/>
      <text x="32" y="33" fill="#3a1d6e">Rhythm</text>
    </g>
  </g>

  <!-- pixel sparkles -->
  <g shape-rendering="crispEdges">
    <rect x="1108" y="48" width="14" height="14" fill="#ffb347"/>
    <rect x="1122" y="62" width="14" height="14" fill="#ff5eb5"/>
    <rect x="52"  y="210" width="12" height="12" fill="#34dd98"/>
  </g>
</svg>
